<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login — FaceAttend AI</title>
  {% load static %}
  <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(ellipse at 30% 40%, rgba(99,102,241,0.12) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 60%, rgba(6,182,212,0.08) 0%, transparent 60%);
    }
    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(24px);
    }
    .brand { text-align: center; margin-bottom: 32px; }
    .brand-icon { font-size: 3rem; margin-bottom: 12px; }
    .brand-name { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, #6366f1, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .brand-sub { font-size: 0.85rem; color: rgba(255,255,255,0.4); margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: rgba(255,255,255,0.7); }
    .form-control {
      width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 12px 16px; color: #e2e8f0; font-size: 0.9rem;
      font-family: 'Inter', sans-serif; transition: all 0.3s; outline: none;
    }
    .form-control:focus { border-color: #6366f1; background: rgba(99,102,241,0.08); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    .form-control::placeholder { color: rgba(255,255,255,0.25); }
    .submit-btn {
      width: 100%; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none;
      color: white; padding: 14px; border-radius: 12px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.3s; margin-top: 8px; font-family: 'Inter', sans-serif;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99,102,241,0.5); }
    .error-msg { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; padding: 12px 16px; font-size: 0.85rem; color: #ef4444; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .admin-link { text-align: center; margin-top: 24px; font-size: 0.82rem; color: rgba(255,255,255,0.3); }
    .admin-link a { color: rgba(99,102,241,0.7); text-decoration: none; }
    .admin-link a:hover { color: #6366f1; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="brand">
    <div class="brand-icon">🎓</div>
    <div class="brand-name">FaceAttend AI</div>
    <div class="brand-sub">Student Self-Service Portal</div>
  </div>

  {% if error %}
  <div class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label" for="student_id">Student ID</label>
      <input class="form-control" type="text" id="student_id" name="student_id" placeholder="e.g. CS2021001" required autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-control" type="password" id="password" name="password" placeholder="Your password" required>
    </div>
    <button class="submit-btn" type="submit"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button>
  </form>

  <div class="admin-link">
    Are you an administrator? <a href="{% url 'login' %}">Admin Login →</a>
  </div>
</div>
</body>
</html>
